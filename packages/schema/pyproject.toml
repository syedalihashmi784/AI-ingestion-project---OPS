# ─────────────────────────────────────────────────────────
# packages/schema — Pydantic data models
#
# WHAT IS THIS PACKAGE?
#   The single source of truth for every data structure in the
#   project. Every service imports from here. If a field changes,
#   it changes in one place and every service picks it up.
#
# WHAT IS PYDANTIC?
#   A Python library that lets you define data structures with
#   types, validation rules, and automatic error messages.
#   Think of it like TypeScript interfaces but for Python.
#   DOCS: https://docs.pydantic.dev/
# ─────────────────────────────────────────────────────────

[project]
name = "ledger-schema"
version = "0.1.0"
description = "Shared Pydantic data models for the Decision Ledger"
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.7.0",      # Data validation and serialisation
    "pydantic-settings>=2.3.0",  # Settings management from .env files
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ledger_schema"]
