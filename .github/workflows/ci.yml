# ─────────────────────────────────────────────────────────
# ci.yml — Continuous Integration
#
# WHAT IS CI?
#   Automated checks that run every time someone pushes code.
#   Catches bugs before they reach other developers.
#
# WHAT THIS DOES:
#   On every push and pull request:
#   1. Runs Python type checking (mypy)
#   2. Runs Python linting (ruff)
#   3. Runs Python tests (pytest)
#   4. Runs TypeScript type checking
#
# DOCS: https://docs.github.com/en/actions
# ─────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy packages/ services/

      - name: Run tests
        run: uv run pytest packages/ services/ tests/ -v

  frontend-checks:
    name: Frontend type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type check
        working-directory: apps/web
        run: npm run type-check
